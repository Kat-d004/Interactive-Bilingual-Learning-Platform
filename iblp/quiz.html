<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Time! - IBLP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-purple">
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="index.html" class="btn btn-ghost btn-icon-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="logo-text" style="font-size: 1.5rem;">Quiz Time!</h1>
            </div>

            <button class="btn btn-outline btn-sm lang-toggle">Sesotho</button>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h2 style="font-size: 2rem; font-family: var(--font-display); margin-bottom: 1rem;">Choose a Topic</h2>
            <p style="color: var(--color-muted-foreground);">What would you like to be quizzed on?</p>
        </div>

        <div class="topics-grid" style="max-width: 64rem;">
            <a href="quiz-colors.html" class="topic-card colors">
                <div class="topic-icon">🎨</div>
                <h3 class="topic-title">Colors</h3>
            </a>

            <a href="quiz-numbers.html" class="topic-card numbers">
                <div class="topic-icon">🔢</div>
                <h3 class="topic-title">Numbers</h3>
            </a>

            <a href="quiz-animals.html" class="topic-card animals">
                <div class="topic-icon">🦁</div>
                <h3 class="topic-title">Animals</h3>
            </a>
        </div>
    </div>

    <div class="decor-blob"></div>
    <div class="decor-circle"></div>
    <div class="decor-circle-right"></div>

    <script src="js/app.js"></script>
    <script>
    // Page-specific language update function
    function updatePageLanguage(lang) {
        console.log('Updating page language to:', lang);
        // This function will be different for each page
        // Example for learn-colors.html:
        if (typeof updateDisplay === 'function') {
            updateDisplay();
        }
    }

    // Listen for language changes from app.js
    window.addEventListener('languageChanged', (event) => {
        updatePageLanguage(event.detail.language);
    });

    // Also check when page loads
    document.addEventListener('DOMContentLoaded', () => {
        // Small delay to ensure app.js loaded first
        setTimeout(() => {
            if (typeof currentLanguage !== 'undefined') {
                updatePageLanguage(currentLanguage);
            }
        }, 100);
    });
  </script>
  <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBLP — Welcome!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ── PAGE LAYOUT ── */
        body {
            background: linear-gradient(155deg, #1A6B52 0%, #00BFA5 50%, #29B6F6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
        }
 
        /* Decorative background elements */
        body::before {
            content: '';
            position: fixed;
            top: -80px; left: -80px;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -60px; right: -60px;
            width: 240px; height: 240px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }
 
        /* Floating mascots */
        .mascot-left {
            position: fixed;
            bottom: 0; left: 0;
            font-size: 7rem;
            opacity: 0.18;
            transform: scaleX(-1);
            pointer-events: none;
            line-height: 1;
        }
        .mascot-right {
            position: fixed;
            top: 1rem; right: -0.5rem;
            font-size: 6rem;
            opacity: 0.16;
            pointer-events: none;
            line-height: 1;
        }
        .mascot-top-left {
            position: fixed;
            top: 1.5rem; left: 1rem;
            font-size: 4rem;
            opacity: 0.14;
            pointer-events: none;
            line-height: 1;
        }
 
        /* ── CARD ── */
        .auth-card {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 2rem;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.22);
            position: relative;
            z-index: 1;
        }
 
        /* ── HEADER ── */
        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-mascot {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 0.4rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        .auth-brand {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.2rem;
            color: #1A3A8F;
            line-height: 1;
        }
        .auth-tagline {
            color: #6B7280;
            font-size: 0.875rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }
 
        /* ── TABS ── */
        .tab-bar {
            display: flex;
            background: #F3F4F6;
            border-radius: 9999px;
            padding: 0.2rem;
            margin-bottom: 1.75rem;
            gap: 0.15rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.55rem;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 0.875rem;
            text-align: center;
            color: #6B7280;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .tab-btn.active {
            background: #fff;
            color: #009688;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
 
        /* ── FORM SECTIONS ── */
        .form-section { display: none; }
        .form-section.active { display: block; }
 
        .form-group { margin-bottom: 1.1rem; }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 700;
            color: #1A1A2E;
            font-size: 0.875rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2.5px solid #E5E7EB;
            border-radius: 0.875rem;
            font-size: 0.975rem;
            font-family: inherit;
            color: #1A1A2E;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #00BFA5;
            box-shadow: 0 0 0 3px rgba(0,191,165,0.12);
        }
        .form-input.error  { border-color: #EF4444; }
        .error-message {
            color: #EF4444;
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 0.3rem;
            display: none;
        }
        .error-message.show { display: block; }
 
        /* ── SECTION LEGEND ── */
        .section-legend {
            font-weight: 800;
            font-size: 0.8rem;
            color: #009688;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 1.25rem 0 0.9rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid #E5E7EB;
        }
 
        /* ── AVATAR PICKER ── */
        .avatar-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .avatar-btn {
            font-size: 1.5rem;
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 2.5px solid #E5E7EB;
            cursor: pointer;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .avatar-btn:hover  { border-color: #00BFA5; }
        .avatar-btn.picked { border-color: #00BFA5; background: #E0F7F5; }
 
        /* ── SUBMIT BUTTON ── */
        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, #00BFA5, #0097A7);
            color: #fff;
            font-weight: 900;
            font-size: 1.05rem;
            font-family: inherit;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,191,165,0.35);
            transition: all 0.2s;
            margin-top: 0.75rem;
            letter-spacing: 0.02em;
        }
        .submit-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #0097A7, #00695C);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,191,165,0.45);
        }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
 
        /* ── SWITCH LINK ── */
        .switch-note {
            text-align: center;
            margin-top: 1.25rem;
            color: #6B7280;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .switch-link {
            color: #009688;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
        }
        .switch-link:hover { text-decoration: underline; }
 
        /* ── ALERT BOX ── */
        .alert {
            padding: 0.85rem 1rem;
            border-radius: 0.875rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            font-weight: 700;
            display: none;
        }
        .alert.error   { background: #FEE2E2; color: #B91C1C; display: block; }
        .alert.success { background: #DCFCE7; color: #166534; display: block; }
 
        /* ── CHILD SELECTOR ── */
        .child-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 0.75rem;
            margin: 1rem 0;
        }
        .child-option {
            padding: 1.1rem 0.75rem;
            border: 3px solid #E5E7EB;
            border-radius: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }
        .child-option:hover {
            border-color: #00BFA5;
            background: #F0FDFA;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,191,165,0.2);
        }
        .child-emoji {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.4rem;
        }
        .child-name {
            font-weight: 800;
            font-size: 0.875rem;
            color: #1A1A2E;
        }
 
        /* ── SIGN OUT BTN ── */
        .signout-btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: 9999px;
            border: 2.5px solid #E5E7EB;
            background: transparent;
            color: #6B7280;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: all 0.2s;
        }
        .signout-btn:hover { border-color: #EF4444; color: #EF4444; }
 
        /* ── SPINNER ── */
        .spinner {
            display: inline-block;
            width: 1.1rem; height: 1.1rem;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin  { to { transform: rotate(360deg); } }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
 
        /* ── RESPONSIVE ── */
        @media (max-width: 380px) {
            .auth-card { padding: 1.75rem 1.1rem 1.5rem; }
        }
 
        /* ── PASSWORD TOGGLE ── */
        .pw-wrap  { position: relative; }
        .pw-eye {
            position: absolute;
            right: 0.875rem; top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            color: #9CA3AF;
            padding: 0.2rem;
            display: flex;
            align-items: center;
        }
        .pw-eye:hover { color: #6B7280; }
    </style>
</head>
<body>
 
<!-- Decorative mascots -->
<span class="mascot-left"  aria-hidden="true">🦁</span>
<span class="mascot-right" aria-hidden="true">🐘</span>
<span class="mascot-top-left" aria-hidden="true">🐻</span>
 
<!-- ══ CARD ══════════════════════════════════════════════════════════════ -->
<div class="auth-card" role="main">
 
    <!-- Header -->
    <div class="auth-header">
        <span class="auth-mascot" aria-hidden="true">📚</span>
        <div class="auth-brand">IBLP</div>
        <div class="auth-tagline">Interactive Bilingual Learning Project</div>
    </div>
 
    <!-- Alert -->
    <div id="alert" class="alert" role="alert" aria-live="polite"></div>
 
    <!-- ── TAB BAR ── -->
    <div class="tab-bar" role="tablist" aria-label="Login or Register">
        <button class="tab-btn active" id="tab-login"
                role="tab" aria-selected="true" aria-controls="login-section"
                onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-register"
                role="tab" aria-selected="false" aria-controls="register-section"
                onclick="switchTab('register')">Create Account</button>
    </div>
 
    <!-- ══ LOGIN FORM ═══════════════════════════════════════════════════ -->
    <div id="login-section" class="form-section active" role="tabpanel" aria-labelledby="tab-login">
        <form id="login-form" novalidate>
 
            <div class="form-group">
                <label class="form-label" for="login-email">📧 Email Address</label>
                <input type="email" id="login-email" class="form-input"
                       placeholder="parent@gmail.com" autocomplete="email" required>
                <div class="error-message" id="login-email-err"></div>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="login-password">🔒 Password</label>
                <div class="pw-wrap">
                    <input type="password" id="login-password" class="form-input"
                           placeholder="••••••••" autocomplete="current-password" required
                           style="padding-right:2.75rem;">
                    <button type="button" class="pw-eye" onclick="togglePw('login-password',this)"
                            aria-label="Show/hide password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="login-password-err"></div>
            </div>
 
            <button type="submit" class="submit-btn">
                <span id="login-btn-text">Sign In 🚀</span>
            </button>
        </form>
 
        <p class="switch-note">
            No account?
            <span class="switch-link" onclick="switchTab('register')">Create one free →</span>
        </p>
    </div>
 
    <!-- ══ REGISTER FORM ════════════════════════════════════════════════ -->
    <div id="register-section" class="form-section" role="tabpanel" aria-labelledby="tab-register">
        <form id="register-form" novalidate>
 
            <!-- Parent info -->
            <div class="section-legend">👤 Parent / Guardian</div>
 
            <div class="form-group">
                <label class="form-label" for="reg-full-name">Full Name</label>
                <input type="text" id="reg-full-name" class="form-input"
                       placeholder="Your full name" autocomplete="name" required>
                <div class="error-message" id="reg-name-err"></div>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="reg-email">Email Address</label>
                <input type="email" id="reg-email" class="form-input"
                       placeholder="your@email.com" autocomplete="email" required>
                <div class="error-message" id="reg-email-err"></div>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="reg-phone">Phone <span style="color:#9CA3AF;font-weight:600;">(optional)</span></label>
                <input type="tel" id="reg-phone" class="form-input"
                       placeholder="+27 71 234 5678" autocomplete="tel">
            </div>
 
            <!-- Child info -->
            <div class="section-legend">🧒 Child's Profile</div>
 
            <div class="form-group">
                <label class="form-label" for="reg-child-name">Child's Name</label>
                <input type="text" id="reg-child-name" class="form-input"
                       placeholder="Your child's name" required>
                <div class="error-message" id="reg-child-err"></div>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="reg-child-age">Age <span style="color:#9CA3AF;font-weight:600;">(optional)</span></label>
                <input type="number" id="reg-child-age" class="form-input"
                       placeholder="5" min="3" max="18">
            </div>
 
            <div class="form-group">
                <label class="form-label">Choose an Avatar</label>
                <div class="avatar-row" id="avatar-row">
                    <button type="button" class="avatar-btn picked" data-emoji="👧">👧</button>
                    <button type="button" class="avatar-btn" data-emoji="👦">👦</button>
                    <button type="button" class="avatar-btn" data-emoji="🧒">🧒</button>
                    <button type="button" class="avatar-btn" data-emoji="🦊">🦊</button>
                    <button type="button" class="avatar-btn" data-emoji="🐸">🐸</button>
                    <button type="button" class="avatar-btn" data-emoji="🌟">🌟</button>
                </div>
                <input type="hidden" id="reg-avatar-emoji" value="👧">
            </div>
 
            <!-- Password -->
            <div class="section-legend">🔒 Security</div>
 
            <div class="form-group">
                <label class="form-label" for="reg-password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="reg-password" class="form-input"
                           placeholder="At least 8 characters"
                           autocomplete="new-password" required
                           style="padding-right:2.75rem;">
                    <button type="button" class="pw-eye" onclick="togglePw('reg-password',this)"
                            aria-label="Show/hide password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="reg-pw-err"></div>
            </div>
 
            <div class="form-group">
                <label class="form-label" for="reg-password-confirm">Confirm Password</label>
                <div class="pw-wrap">
                    <input type="password" id="reg-password-confirm" class="form-input"
                           placeholder="Repeat password"
                           autocomplete="new-password" required
                           style="padding-right:2.75rem;">
                    <button type="button" class="pw-eye" onclick="togglePw('reg-password-confirm',this)"
                            aria-label="Show/hide password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="reg-pw2-err"></div>
            </div>
 
            <button type="submit" class="submit-btn">
                <span id="register-btn-text">Create Free Account 🎉</span>
            </button>
        </form>
 
        <p class="switch-note">
            Already have an account?
            <span class="switch-link" onclick="switchTab('login')">Sign in →</span>
        </p>
    </div>
 
    <!-- ══ CHILD SELECTION ══════════════════════════════════════════════ -->
    <div id="child-selection-section" class="form-section" role="tabpanel">
        <div style="text-align:center;margin-bottom:1.25rem;">
            <div style="font-size:2.5rem;margin-bottom:0.4rem;">🌟</div>
            <h2 style="font-family:'Fredoka One',sans-serif;font-size:1.6rem;color:#1A3A8F;margin-bottom:0.25rem;">
                Who's learning today?
            </h2>
            <p style="color:#6B7280;font-size:0.875rem;font-weight:600;">Tap your picture to start!</p>
        </div>
 
        <div id="children-list" class="child-selector"></div>
 
        <button type="button" class="signout-btn" onclick="logout()">← Back / Sign Out</button>
    </div>
 
</div><!-- /auth-card -->
 
<!-- ══ SCRIPTS ════════════════════════════════════════════════════════════ -->
<script>
    const API_BASE = './api';
 
    /* ── Blocked disposable email domains ── */
    const BLOCKED_DOMAINS = new Set([
        'mailinator.com','guerrillamail.com','guerrillamail.info','guerrillamail.net',
        'guerrillamail.org','guerrillamail.de','grr.la','sharklasers.com',
        'spam4.me','trashmail.com','trashmail.at','trashmail.io','trashmail.me',
        'yopmail.com','yopmail.fr','throwaway.email','dispostable.com',
        'fakeinbox.com','maildrop.cc','tempmail.com','temp-mail.org',
        'getnada.com','mohmal.com','mailnull.com','spamgourmet.com',
    ]);
 
    function validateEmailClient(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
        if (!emailRegex.test(email)) {
            return { valid: false, message: 'Please enter a valid email (e.g. name@gmail.com).' };
        }
        const domain = email.split('@')[1].toLowerCase();
        if (BLOCKED_DOMAINS.has(domain)) {
            return { valid: false, message: 'Disposable emails are not allowed. Please use Gmail, Yahoo, Outlook, etc.' };
        }
        const parts = domain.split('.');
        if (parts.length < 2 || parts[parts.length - 1].length < 2) {
            return { valid: false, message: 'Please enter a valid email (e.g. name@gmail.com).' };
        }
        return { valid: true, message: '' };
    }
 
    /* ── Tab switching ── */
    function switchTab(tab) {
        const isLogin = (tab === 'login');
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-register').classList.toggle('active', !isLogin);
        document.getElementById('tab-login').setAttribute('aria-selected', isLogin ? 'true' : 'false');
        document.getElementById('tab-register').setAttribute('aria-selected', isLogin ? 'false' : 'true');
        document.getElementById('login-section').classList.toggle('active', isLogin);
        document.getElementById('register-section').classList.toggle('active', !isLogin);
        hideAlert();
    }
 
    /* Legacy compatibility */
    function toggleForms() {
        const loginActive = document.getElementById('login-section').classList.contains('active');
        switchTab(loginActive ? 'register' : 'login');
    }
 
    /* ── Alert helpers ── */
    function showAlert(message, type = 'error') {
        const el = document.getElementById('alert');
        el.textContent = message;
        el.className = `alert ${type}`;
        if (type !== 'error') {
            setTimeout(hideAlert, 4000);
        }
    }
    function hideAlert() {
        const el = document.getElementById('alert');
        el.className = 'alert';
    }
 
    /* ── Field error helpers ── */
    function showErr(inputId, errId, message) {
        const inp = document.getElementById(inputId);
        const err = document.getElementById(errId);
        if (inp)  inp.classList.add('error');
        if (err)  { err.textContent = message; err.classList.add('show'); }
    }
    function clearErr(inputId, errId) {
        const inp = document.getElementById(inputId);
        const err = document.getElementById(errId);
        if (inp)  inp.classList.remove('error');
        if (err)  err.classList.remove('show');
    }
    /* Legacy showFieldError / clearFieldError for old JS code */
    function showFieldError(fieldId, message) {
        const input = document.getElementById(fieldId);
        if (!input) return;
        const errorEl = input.parentElement.querySelector('.error-message') || input.nextElementSibling;
        if (errorEl) { errorEl.textContent = message; errorEl.classList.add('show'); }
        input.classList.add('error');
    }
    function clearFieldError(fieldId) {
        const input = document.getElementById(fieldId);
        if (!input) return;
        const errorEl = input.parentElement.querySelector('.error-message') || input.nextElementSibling;
        if (errorEl) errorEl.classList.remove('show');
        input.classList.remove('error');
    }
 
    /* ── Password visibility toggle ── */
    function togglePw(inputId, btn) {
        const inp = document.getElementById(inputId);
        const isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        btn.querySelector('circle')?.setAttribute('r', isText ? '3' : '1');
    }
 
    /* ── Avatar picker ── */
    document.querySelectorAll('.avatar-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('picked'));
            btn.classList.add('picked');
            document.getElementById('reg-avatar-emoji').value = btn.dataset.emoji;
        });
    });
 
    /* ── Live email validation ── */
    function attachEmailValidation(inputId, errId) {
        const input = document.getElementById(inputId);
        if (!input) return;
        input.addEventListener('blur', () => {
            const val = input.value.trim();
            if (!val) return;
            const result = validateEmailClient(val);
            if (!result.valid) showFieldError(inputId, result.message);
            else clearFieldError(inputId);
        });
        input.addEventListener('input', () => clearFieldError(inputId));
    }
    attachEmailValidation('login-email');
    attachEmailValidation('reg-email');
 
    /* ── LOGIN ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
 
        const emailCheck = validateEmailClient(email);
        if (!emailCheck.valid) { showFieldError('login-email', emailCheck.message); return; }
 
        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Signing in…';
 
        try {
            const response = await fetch(`${API_BASE}/login.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
 
            if (!response.ok) {
                showAlert(data.error || 'Login failed. Please check your email and password.');
                btn.disabled = false;
                btn.innerHTML = '<span id="login-btn-text">Sign In 🚀</span>';
                return;
            }
 
            sessionStorage.setItem('parent_id',   data.parent_id);
            sessionStorage.setItem('parent_name', data.parent_name);
            showChildSelection(data.children);
 
        } catch (error) {
            showAlert('Network error: ' + error.message + '. Is XAMPP running?');
            btn.disabled = false;
            btn.innerHTML = '<span id="login-btn-text">Sign In 🚀</span>';
        }
    });
 
    /* ── REGISTER ── */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const regEmail = document.getElementById('reg-email').value.trim();
        const emailCheck = validateEmailClient(regEmail);
        if (!emailCheck.valid) { showFieldError('reg-email', emailCheck.message); return; }
 
        const data = {
            full_name:         document.getElementById('reg-full-name').value,
            email:             regEmail,
            phone:             document.getElementById('reg-phone').value || null,
            password:          document.getElementById('reg-password').value,
            password_confirm:  document.getElementById('reg-password-confirm').value,
            child_name:        document.getElementById('reg-child-name').value,
            child_age:         document.getElementById('reg-child-age').value || null,
            avatar_emoji:      document.getElementById('reg-avatar-emoji').value
        };
 
        const btn = e.target.querySelector('.submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Creating…';
 
        try {
            const response = await fetch(`${API_BASE}/register.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(data)
            });
            const result = await response.json();
 
            if (!response.ok) {
                const msg = result.errors ? result.errors[0] : (result.error || 'Registration failed.');
                showAlert(msg);
                btn.disabled = false;
                btn.innerHTML = '<span>Create Free Account 🎉</span>';
                return;
            }
 
            showAlert('🎉 Account created! Redirecting…', 'success');
            setTimeout(() => { window.location.href = result.redirect; }, 2000);
 
        } catch (error) {
            showAlert('Network error: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = '<span>Create Free Account 🎉</span>';
        }
    });
 
    /* ── CHILD SELECTION ── */
    function showChildSelection(children) {
        document.getElementById('login-section').classList.remove('active');
        document.getElementById('register-section').classList.remove('active');
        document.getElementById('tab-login').classList.remove('active');
        document.getElementById('tab-register').classList.remove('active');
        document.getElementById('child-selection-section').classList.add('active');
        hideAlert();
 
        const list = document.getElementById('children-list');
        list.innerHTML = children.map(child => `
            <div class="child-option" onclick="selectChild(${child.child_id}, '${escHtml(child.name)}')"
                 role="button" tabindex="0" aria-label="Select ${escHtml(child.name)}">
                <span class="child-emoji">${child.avatar_emoji || '🧒'}</span>
                <span class="child-name">${escHtml(child.name)}</span>
            </div>
        `).join('');
    }
 
    function selectChild(childId, childName) {
        sessionStorage.setItem('selected_child_id',   childId);
        sessionStorage.setItem('selected_child_name', childName);
        window.location.href = `index.html?child_id=${childId}`;
    }
 
    async function logout() {
        try {
            await fetch(`${API_BASE}/logout.php`, { method: 'POST', credentials: 'include' });
        } catch {}
        sessionStorage.clear();
        document.getElementById('child-selection-section').classList.remove('active');
        switchTab('login');
    }
 
    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
 
    /* ── Auto-check session ── */
    async function checkAuth() {
        try {
            const response = await fetch(`${API_BASE}/auth-check.php`, { credentials: 'include' });
            const data = await response.json();
            if (data.authenticated) {
                sessionStorage.setItem('parent_id',   data.parent_id);
                sessionStorage.setItem('parent_name', data.parent_name);
                showChildSelection(data.children);
            }
        } catch {}
    }
    window.addEventListener('load', checkAuth);
</script>
</body>
</html>
